<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">FASHION</div>
    <nav>
        <a href="index.html">Головна</a>
        <a href="catalog.html">Каталог</a>
        <a href="wishlist.html">Обране</a>
        <a href="cart.html">Кошик</a>
        <a href="login.html">Вхід</a>
    </nav>
</header>

<div class="container">
    <h1>Каталог товарів</h1>

    <div class="products-grid">

        <!-- Товар 1 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x350">
            <h3>Джинси Slim</h3>
            <p>1800 грн</p>

            <p>Розмір:</p>
            <select id="size1">
                <option>S</option>
                <option selected>M</option>
                <option>L</option>
            </select>

            <br><br>
            <button onclick="addToCart(
                'Джинси Slim',
                1800,
                document.getElementById('size1').value
            )">
                В кошик
            </button>

            <button onclick="addToWishlist('Джинси Slim',1800)">
                ❤️
            </button>
        </div>

        <!-- Товар 2 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x350">
            <h3>Футболка Basic</h3>
            <p>900 грн</p>

            <p>Розмір:</p>
            <select id="size2">
                <option>S</option>
                <option>M</option>
                <option selected>L</option>
            </select>

            <br><br>
            <button onclick="addToCart(
                'Футболка Basic',
                900,
                document.getElementById('size2').value
            )">
                В кошик
            </button>

            <button onclick="addToWishlist('Футболка Basic',900)">
                ❤️
            </button>
        </div>

    </div>
</div>

<footer>© 2026 Fashion Store</footer>

<script src="java.js"></script>
</body>
</html>
